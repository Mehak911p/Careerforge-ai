<!DOCTYPE html>
<html>
<head>
<title>CareerForge AI</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:80%;
max-width:600px;
background:#1f2937;
padding:20px;
border-radius:15px;
}

#chat{
height: 550px;
overflow-y: auto;
background:#111827;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

input{
width:75%;
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}
 button:hover{
background:#1d4ed8;
 }
 .user-message{
background:#2563eb;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.ai-message{
background:#374151;
padding:10px;
margin:10px 0;
border-radius:10px;
}  
.upload-btn{
display:inline-block;
padding:12px 18px;
background:#10b981;
color:white;
border-radius:12px;
cursor:pointer;
margin-bottom:10px;
font-weight:bold;
}

.upload-btn:hover{
background:#059669;
}

#preview{
max-width:100%;
border:2px solid #374151;
}
</style>
</head>

<body>

<div class="box">

<h1>🚀 CareerForge AI</h1>
<p>Your AI Career & Learning Assistant</p>

<div id="chat">

    <div style="padding:10px; color:white;">
        👋 Welcome to CareerForge AI
        <br><br>

        I can help with:
        <br>• Career planning
        <br>• Interview preparation
        <br>• Learning roadmaps
        <br>• Skill development
        <br>• Software development guidance
    </div>

</div>

<label for="imageUpload" class="upload-btn">📷 Upload Image</label>
<input type="file" id="imageUpload" accept="image/*" hidden>

<div id="previewContainer" style="display:none; margin-top:15px;">
    <img id="preview" width="220" style="border-radius:12px;">
    <br><br>
    <button onclick="removeImage()">❌ Remove Image</button>
</div>
<br><br>
<input id="msg" placeholder="Ask anything">
<button onclick="send()">Send</button>
<button onclick="clearChat()">Clear</button>

</div>

<script>

async function send(){

let msg=document.getElementById("msg").value;

document.getElementById("chat").innerHTML +=
"<div class='user-message'><b>You:</b><br>"+msg+"</div>";

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});
document.getElementById("chat").innerHTML +=
"<p id='thinking'><b>AI:</b> Thinking...</p>";
let data=await res.json();
let thinking = document.getElementById("thinking");
if (thinking) {
    thinking.remove();
}
document.getElementById("chat").innerHTML +=
"<div class='ai-message'><b>AI:</b><br>"+data.reply.replace(/\n/g,"<br>")+"</div>";

document.getElementById("msg").value="";
document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight;
}
document.getElementById("msg").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        send();
    }
});
 document.getElementById("imageUpload").addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

document.getElementById("preview").src = event.target.result;

document.getElementById("previewContainer").style.display = "block";

};

reader.readAsDataURL(file);

});

function removeImage(){

document.getElementById("imageUpload").value="";

document.getElementById("previewContainer").style.display="none";

}
function clearChat(){
    document.getElementById("chat").innerHTML="";
 }
</script>

</body>
</html>

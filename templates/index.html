<!DOCTYPE html>
<html>
<head>
<title>CareerForge AI</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:80%;
max-width:600px;
background:#1f2937;
padding:20px;
border-radius:15px;
}

#chat{
height: 450px;
overflow-y: auto;
background:#111827;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}
</style>
</head>

<body>

<div class="box">

<h1>CareerForge AI</h1>

<div id="chat">

    <div style="padding:10px; color:white;">
        👋 Welcome to CareerForge AI
        <br><br>

        I can help with:
        <br>• Career planning
        <br>• Interview preparation
        <br>• Learning roadmaps
        <br>• Skill development
        <br>• Software development guidance
    </div>

</div>

<input id="msg" placeholder="Ask anything">
<button onclick="send()">Send</button>

</div>

<script>

async function send(){

let msg=document.getElementById("msg").value;

document.getElementById("chat").innerHTML +=
"<p><b>You:</b> "+msg+"</p>";

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data=await res.json();

document.getElementById("chat").innerHTML +=
"<p><b>AI:</b> "+data.reply.replace(/\n/g,"<br>")+"</p>";

document.getElementById("msg").value="";
}
document.getElementById("msg").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
